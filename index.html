/* ── TINY UI ── */
function Badge({ status }) {
  const m = STATUS_META[status] || { bg:"#F3F4F6", color:"#374151", dot:"#9CA3AF" };
  return <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:m.bg, color:m.color, borderRadius:20, padding:"3px 9px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>
    <span style={{ width:5, height:5, borderRadius:"50%", background:m.dot, display:"inline-block" }} />{status}
  </span>;
}
function APill({ addrId }) {
  const a = ADDRESSES.find(x=>x.id===addrId);
  if (!a) return null;
  return <span style={{ background:a.light, color:a.color, border:`1px solid ${a.color}30`, borderRadius:6, padding:"2px 7px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{a.short}</span>;
}
function KCard({ label, value, icon, color="#111827", sub }) {
  return <div style={{ background:G.card, borderRadius:12, padding:"16px 18px", boxShadow:"0 1px 3px rgba(0,0,0,0.09)", position:"relative", overflow:"hidden" }}>
    <div style={{ position:"absolute", right:14, top:12, fontSize:24, opacity:.12 }}>{icon}</div>
    <div style={{ fontSize:10, fontWeight:700, color:G.textMuted, textTransform:"uppercase", letterSpacing:.8, marginBottom:5 }}>{label}</div>
    <div style={{ fontSize:24, fontWeight:800, color, lineHeight:1, letterSpacing:-.5 }}>{value}</div>
    {sub && <div style={{ fontSize:10, color:G.textMuted, marginTop:4 }}>{sub}</div>}
  </div>;
}
function F({ label, children }) {
  return <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
    {label && <label style={{ fontSize:11, fontWeight:700, color:G.textSecondary, letterSpacing:.3 }}>{label}</label>}
    {children}
  </div>;
}
const iStyle = { border:`1.5px solid ${G.border}`, borderRadius:8, padding:"8px 11px", fontSize:13, color:G.text, outline:"none", background:"#FAFAFA", fontFamily:FONT, width:"100%", boxSizing:"border-box" };
function Inp({ label, ...p }) { return <F label={label}><input {...p} style={{ ...iStyle, ...p.style }} /></F>; }
function Sel({ label, children, ...p }) { return <F label={label}><select {...p} style={{ ...iStyle, cursor:"pointer", ...p.style }}>{children}</select></F>; }
function Txa({ label, ...p }) { return <F label={label}><textarea {...p} style={{ ...iStyle, resize:"vertical", minHeight:60, ...p.style }} /></F>; }

const btnV = {

function Btn({ children, variant="primary", size="md", ...p }) {

}

function Modal({ title, onClose, width=560, children }) {
  return <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}

    <div style={{ background:"#fff", borderRadius:16, width:`min(95vw,${width}px)`, maxHeight:"92vh", overflow:"auto", boxShadow:"0 24px 60px rgba(0,0,0,0.28)" }}>

        <span style={{ fontWeight:800, fontSize:15, color:G.text }}>{title}</span>
        <button onClick={onClose} style={{ border:"none", background:"#F3F4F6", borderRadius:7, width:28, height:28, cursor:"pointer", fontSize:15, color:G.textSecondary, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
      </div>
      <div style={{ padding:"18px 22px 22px", overflowY:"auto" }}>{children}</div>
    </div>
  </div>;
}

function DataTable({ cols, rows, footer }) {
  return <div style={{ background:G.card, borderRadius:12, boxShadow:"0 1px 3px rgba(0,0,0,0.09)", overflow:"hidden" }}>
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse" }}>
        <thead><tr style={{ background:"#F9FAFB" }}>
          {cols.map(c=><th key={c.k} style={{ padding:"10px 13px", textAlign:"left", fontSize:10, color:G.textMuted, fontWeight:700, textTransform:"uppercase", letterSpacing:.7, whiteSpace:"nowrap" }}>{c.label}</th>)}
        </tr></thead>
        <tbody>
          {rows.length===0
            ? <tr><td colSpan={cols.length} style={{ padding:"36px", textAlign:"center", color:G.textMuted, fontSize:13 }}>ჩანაწერი ვერ მოიძებნა</td></tr>
            : rows.map((row,i)=><tr key={row.id||i} style={{ borderTop:`1px solid ${G.border}`, background:i%2===1?"#FAFAFA":"#fff" }}>
                {cols.map(c=><td key={c.k} style={{ padding:"9px 13px", fontSize:13, color:G.text, verticalAlign:"middle" }}>{c.fn ? c.fn(row) : row[c.k]}</td>)}
              </tr>)
          }
        </tbody>
      </table>
    </div>
    {footer && <div style={{ padding:"9px 13px", background:"#F9FAFB", borderTop:`1px solid ${G.border}`, display:"flex", gap:18, flexWrap:"wrap", alignItems:"center" }}>{footer}</div>}
  </div>;
}

function Filters({ addr, setAddr, month, setMonth, cat, setCat, status, setStatus, cats, extra }) {
  const ss = { border:`1.5px solid ${G.border}`, borderRadius:8, padding:"7px 11px", fontSize:12, color:G.text, background:"#fff", cursor:"pointer", fontFamily:FONT, fontWeight:600 };
  const dirty = addr!=="all"||month!=="all"||cat!=="all"||(status&&status!=="all");
  return <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
    <span style={{ fontSize:10, fontWeight:700, color:G.textMuted, textTransform:"uppercase", letterSpacing:.7 }}>ფილტ.:</span>
    <select value={addr} onChange={e=>setAddr(e.target.value)} style={ss}>
      <option value="all">🏗 ყველა ობ.</option>
      {ADDRESSES.map(a=><option key={a.id} value={a.id}>{a.short}</option>)}
    </select>
    <select value={month} onChange={e=>setMonth(e.target.value)} style={ss}>
      <option value="all">📅 ყველა თვე</option>
      {MONTHS_F.map((m,i)=><option key={i} value={i}>{m}</option>)}
    </select>
    <select value={cat} onChange={e=>setCat(e.target.value)} style={ss}>
      <option value="all">🗂 ყველა კატ.</option>
      {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
    </select>
    {status !== undefined && <select value={status} onChange={e=>setStatus(e.target.value)} style={ss}>
      <option value="all">📋 ყველა სტ.</option>
      {Object.keys(STATUS_META).map(s=><option key={s}>{s}</option>)}
    </select>}
    {extra}
    {dirty && <button onClick={()=>{ setAddr("all"); setMonth("all"); setCat("all"); setStatus&&setStatus("all"); }} style={{ border:"none", background:G.accentLight, color:G.accent, borderRadius:8, padding:"7px 11px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:FONT }}>✕ გასუფ.</button>}
  </div>;
}

function SearchBox({ value, onChange, ph="ძიება..." }) {
  return <div style={{ position:"relative" }}>
    <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:G.textMuted, fontSize:13 }}>🔍</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{ ...iStyle, paddingLeft:28, width:200 }} />
  </div>;
}

function Toggle({ label, desc, value, onChange }) {
  return <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:`1px solid ${G.border}` }}>
    <div><div style={{ fontSize:13, fontWeight:600, color:G.text }}>{label}</div>{desc&&<div style={{ fontSize:11, color:G.textMuted, marginTop:1 }}>{desc}</div>}</div>
    <div onClick={onChange} style={{ width:38, height:21, borderRadius:11, background:value?G.accent:"#D1D5DB", cursor:"pointer", position:"relative", transition:"background .18s", flexShrink:0, marginLeft:14 }}>
      <div style={{ position:"absolute", top:2.5, left:value?18:2.5, width:16, height:16, borderRadius:"50%", background:"#fff", transition:"left .18s", boxShadow:"0 1px 3px rgba(0,0,0,.2)" }} />
    </div>
  </div>;
}

const NAV = [
  { id:"dashboard",  label:"მთ. დაფა",    icon:"⬛" },
  { id:"inventory",  label:"ინვენტარი",   icon:"📦" },

  { id:"reports",    label:"ანგარ.",      icon:"📊" },

function App() {
  const [page, setPage] = useState("dashboard");
  const [items, setItems] = useState(ITEMS0);
  const [purch, setPurch] = useState(PURCH0);
  const [spends, setSpends] = useState(SPENDS0);
  const [cats, setCats] = useState(INIT_CATS);
  const [collapsed, setCollapsed] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);

  /* filters */
  const [fA, setFA] = useState("all");
  const [fM, setFM] = useState("all");
  const [fC, setFC] = useState("all");
  const [fSt, setFSt] = useState("all");

  /* search */
  const [sI, setSI] = useState("");
  const [sP, setSP] = useState("");
  const [sSp, setSSp] = useState("");

  /* modal stack */
  const [modal, setModal] = useState(null);
  const [detItem, setDetItem] = useState(null);

  /* forms */
  const E_ITEM  = { name:"", catId:"1", unit:"ც.", qty:"", minQ:"", price:"", addrId:"1", notes:"" };
  const E_PURCH = { date:new Date().toISOString().slice(0,10), item:"", catId:"1", addrId:"1", qty:"", unit:"ც.", up:"", sup:"", status:"მიმდინარე", notes:"" };
  const E_SPEND = { date:new Date().toISOString().slice(0,10), desc:"", catId:"1", addrId:"1", amount:"", status:"მოლოდინი", notes:"" };
  const E_CAT   = { name:"", icon:"📦", color:"#6B7280" };
  const [iF, setIF] = useState(E_ITEM);
  const [pF, setPF] = useState(E_PURCH);
  const [sF, setSF] = useState(E_SPEND);
  const [cF, setCF] = useState(E_CAT);

  /* settings */
  const [cfg, setCfg] = useState({ lowAlert:true, autoOrder:false, emailNotif:true, approval:true, cur:"₾", tax:"18", defUnit:"ც." });

  /* computed */
  const now = new Date();
  const cm = now.getMonth();
  const lowItems = useMemo(()=>items.filter(i=>i.qty<=i.minQ),[items]);
  const invVal   = useMemo(()=>items.reduce((s,i)=>s+i.price*i.qty,0),[items]);
  const thisPur  = useMemo(()=>purch.filter(p=>new Date(p.date).getMonth()===cm),[purch,cm]);
  const thisSp   = useMemo(()=>spends.filter(s=>new Date(s.date).getMonth()===cm),[spends,cm]);

  function filt(arr, getA, getM, getC, getSt, search, getN) {
    return arr.filter(r=>{
      if(fA!=="all"&&getA(r)!==+fA) return false;
      if(fM!=="all"&&getM(r)!==+fM) return false;
      if(fC!=="all"&&getC(r)!==+fC) return false;
      if(fSt!=="all"&&getSt&&getSt(r)!==fSt) return false;
      if(search&&!getN(r).toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }

  const fItems = useMemo(()=>filt(items,r=>r.addrId,()=>-1,r=>r.catId,null,sI,r=>r.name),[items,fA,fC,sI]);
  const fPurch = useMemo(()=>filt(purch,r=>r.addrId,r=>new Date(r.date).getMonth(),r=>r.catId,r=>r.status,sP,r=>r.item),[purch,fA,fM,fC,fSt,sP]);
  const fSpend = useMemo(()=>filt(spends,r=>r.addrId,r=>new Date(r.date).getMonth(),r=>r.catId,r=>r.status,sSp,r=>r.desc),[spends,fA,fM,fC,fSt,sSp]);

  const cur = cfg.cur;

  function addItem() {
    setItems(p=>[...p,{id:uid(),name:iF.name,catId:+iF.catId,unit:iF.unit,qty:+iF.qty,minQ:+iF.minQ,price:+iF.price,addrId:+iF.addrId,notes:iF.notes}]);
    setIF(E_ITEM); setModal(null);
  }
  function addPurch() {
    const p={id:uid(),date:pF.date,item:pF.item,catId:+pF.catId,addrId:+pF.addrId,qty:+pF.qty,unit:pF.unit,up:+pF.up,sup:pF.sup,status:pF.status,notes:pF.notes};
    setPurch(prev=>[p,...prev]);
    setItems(prev=>{ const i=prev.findIndex(x=>x.name===p.item&&x.addrId===p.addrId); if(i>=0){const c=[...prev];c[i]={...c[i],qty:c[i].qty+p.qty};return c;} return prev; });
    setPF(E_PURCH); setModal(null);

        <div style={{ display:"flex", gap:8, marginTop:14, justifyContent:"flex-end" }}>

          </div>
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:G.textMuted, marginBottom:3 }}>
              <span>მარ. დ.</span>
              <span style={{ fontWeight:700, color:low?G.accent:G.green }}>{low?"⚠ მ.":"✅ ნ."}</span>
            </div>
            <div style={{ width:"100%", height:7, background:"#F3F4F6", borderRadius:4 }}>
              <div style={{ width:`${pct}%`, height:"100%", background:low?G.accent:G.green, borderRadius:4 }} />
            </div>
          </div>
          {detItem.notes&&<div style={{ background:"#FFF9C4", borderRadius:8, padding:"9px 11px", fontSize:12, color:"#78350F", marginBottom:12 }}>📝 {detItem.notes}</div>}
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn size="sm" variant="secondary" onClick={()=>{ setModal(null); setDetItem(null); }}>დახ.</Btn>
            <Btn size="sm" onClick={()=>{ setModal("purch"); setDetItem(null); }}>🛒 შეს.</Btn>
          </div>
        </Modal>;
      })()}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
